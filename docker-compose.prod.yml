networks:
  projects:
    name: projects
    external: true

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gm-api
    restart: unless-stopped
    env_file: .env
    networks:
      - projects
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gm-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - projects
