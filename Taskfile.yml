version: '3'

vars:
  DATABASE_URL: '{{default "postgres://game_master:game_master@localhost:5434/game_master?sslmode=disable" .DATABASE_URL}}'
  APP_LOG_FILE: '{{default ".logs/tui.log" .APP_LOG_FILE}}'


tasks:
  dev:
    desc: Start local Postgres, run migrations, then launch the TUI using .env settings
    cmds:
      - set -a && . ./.env && set +a && export DATABASE_URL="${DATABASE_URL:-$GM_DB_URL}" && (docker start game-master-postgres || docker compose up -d postgres) && task migrate && go run ./cmd/tui

  dev:app-logs:
    desc: Start local Postgres, run migrations, then launch the TUI with app stderr captured to a log file
    cmds:
      - mkdir -p .logs
      - rm -f '{{.APP_LOG_FILE}}' && touch '{{.APP_LOG_FILE}}'
      - set -a && . ./.env && set +a && export DATABASE_URL="${DATABASE_URL:-$GM_DB_URL}" && (docker start game-master-postgres || docker compose up -d postgres) && task migrate && sh -c 'go run ./cmd/tui 2>> "{{.APP_LOG_FILE}}"'

  logs:app:
    desc: Tail captured TUI app logs
    cmds:
      - mkdir -p .logs && touch '{{.APP_LOG_FILE}}'
      - tail -f '{{.APP_LOG_FILE}}'

  logs:postgres:
    desc: Stream local Postgres logs for debugging
    cmds:
      - docker logs -f game-master-postgres

  logs:ollama:
    desc: Stream Ollama logs from Docker if present, else from the system service
    cmds:
      - |
        if docker ps -a --format '{{.Names}}' | grep -qx 'game-master-ollama'; then
          docker logs -f game-master-ollama
        elif systemctl is-active --quiet ollama; then
          journalctl -fu ollama
        else
          echo 'No game-master-ollama container or active system ollama service found.' >&2
          exit 1
        fi

  reset:first-boot:
    desc: Reset local Postgres data to first-boot state (destroys local game data)
    cmds:
      - docker rm -f game-master-postgres || true
      - docker volume rm game-master_postgres_data || true
      - docker compose up -d postgres
      - task migrate

  migrate:
    desc: Run goose migrations against the configured database
    cmds:
      - go run github.com/pressly/goose/v3/cmd/goose@v3.24.1 -dir ./migrations postgres '{{.DATABASE_URL}}' up

  migrate:create:
    desc: Create a new goose migration file
    cmds:
      - go run github.com/pressly/goose/v3/cmd/goose@v3.24.1 -dir ./migrations create {{.CLI_ARGS}} sql

  generate:
    desc: Generate type-safe database code with sqlc
    cmds:
      - go run github.com/sqlc-dev/sqlc/cmd/sqlc@v1.29.0 generate

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:unit:
    desc: Run unit tests only (exclude integration)
    cmds:
      - go test -short ./...

  test:integration:
    desc: Run integration tests only
    cmds:
      - go test -tags integration -run Integration ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  build:
    desc: Build the server and TUI binaries
    cmds:
      - mkdir -p ./bin
      - go build -o ./bin/tui ./cmd/tui
      - go build -o ./bin/server ./cmd/server
      - go build -o ./bin/logs ./cmd/logs


  logs:stream:
    desc: Stream structured game logs with colors and filtering
    cmds:
      - go run ./cmd/logs {{.CLI_ARGS}}

  logs:clean:
    desc: Remove all structured log files
    cmds:
      - rm -f .logs/game-master.jsonl