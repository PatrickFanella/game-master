services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: game-master-postgres
    environment:
      POSTGRES_DB: game_master
      POSTGRES_USER: game_master
      POSTGRES_PASSWORD: game_master
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game_master -d game_master"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: game-master-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
