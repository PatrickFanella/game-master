version: '2'
sql:
  - engine: postgresql
    schema:
      - ./migrations
      - ./schema
    queries: ./queries
    gen:
      go:
        package: statedb
        out: ./internal/state/sqlc
        sql_package: pgx/v5
        emit_interface: true
        overrides:
          - db_type: "vector"
            go_type:
              import: "github.com/pgvector/pgvector-go"
              type: "Vector"
